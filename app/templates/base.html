<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GiteaCopilot{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/">
                <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span>GiteaCopilot</span>
            </a>
        </div>
        <div class="navbar-menu">
            {% if is_admin %}
                <a href="/admin/dashboard">管理面板</a>
                <a href="/admin/logout" class="btn-nav-logout">退出</a>
            {% else %}
                <a href="/admin/login">登录</a>
            {% endif %}
        </div>
    </nav>

    <main class="main-content">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="alert alert-success">{{ message }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>GiteaCopilot - 为 Gitea 提供 AI 智能助手</p>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
