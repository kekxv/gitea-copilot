{% extends "base.html" %}
{% block title %}注册{% endblock %}

{% block content %}
<div class="card-hero">
    <div class="card-header">
        <h2>创建管理员</h2>
        <p>首次使用，请创建账号</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form action="/admin/register" method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required placeholder="至少3字符" autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required placeholder="至少6字符">
        </div>
        <button type="submit" class="btn btn-primary btn-block">创建账号</button>
    </form>
</div>
{% endblock %}
