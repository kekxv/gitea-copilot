{% extends "base.html" %}
{% block title %}修改密码 - GiteaCopilot{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>修改密码</h2>
        <p class="text-muted">当前账号：{{ admin_username }}</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}

    <form action="/admin/password" method="post">
        <div class="form-group">
            <label for="current_password">当前密码</label>
            <input type="password" id="current_password" name="current_password" required autofocus>
        </div>

        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" required placeholder="至少6个字符">
        </div>

        <button type="submit" class="btn btn-primary">修改密码</button>
        <a href="/admin/dashboard" class="btn btn-outline">返回</a>
    </form>
</div>
{% endblock %}
