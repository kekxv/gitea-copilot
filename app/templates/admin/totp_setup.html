{% extends "base.html" %}
{% block title %}两步验证{% endblock %}

{% block content %}
<div class="card-hero" style="max-width: 480px;">
    <div class="card-header">
        <h2>启用两步验证</h2>
        <p>使用 Authenticator 应用扫码</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <div style="padding: 1.5rem;">
        <div class="totp-setup">
            <div class="totp-qr">
                <img src="{{ qr_data_uri }}" alt="QR Code">
            </div>
            <div>
                <div class="form-group">
                    <label>密钥</label>
                    <div class="secret-display">{{ totp_secret }}</div>
                    <small class="form-hint">无法扫码时手动输入</small>
                </div>
            </div>
        </div>
        <form action="/admin/totp/enable" method="post">
            <input type="hidden" name="totp_secret" value="{{ totp_secret }}">
            <div class="form-group">
                <label>验证码确认</label>
                <input type="text" name="otp_code" required placeholder="输入6位验证码" maxlength="6" autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-block">确认启用</button>
        </form>
        <div class="mt-2">
            <a href="/admin/dashboard" class="btn btn-outline btn-block">取消</a>
        </div>
    </div>
</div>
{% endblock %}
