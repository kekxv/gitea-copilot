{% extends "base.html" %}
{% block title %}管理员登录 - GiteaCopilot{% endblock %}

{% block content %}
<div class="card card-hero">
    <div class="card-header">
        <h2>管理员登录</h2>
        <p class="text-muted">请输入账号密码登录管理后台</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/admin/login" method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required value="{{ username or '' }}" autofocus>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="otp_code">TOTP 验证码</label>
            <input type="text" id="otp_code" name="otp_code" placeholder="6位数字验证码（如已开启两步验证）" maxlength="6" pattern="\d{6}">
            <small class="form-hint">如果您已开启两步验证，请输入验证码；未开启可留空</small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
</div>
{% endblock %}
