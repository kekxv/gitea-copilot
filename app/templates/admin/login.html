{% extends "base.html" %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="card-hero">
    <div class="card-header">
        <h2>管理员登录</h2>
        <p>请输入账号密码</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form action="/admin/login" method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required value="{{ username or '' }}" autofocus>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>验证码（可选）</label>
            <input type="text" name="otp_code" placeholder="两步验证码" maxlength="6">
            <small class="form-hint">如已开启两步验证请输入</small>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
</div>
{% endblock %}
