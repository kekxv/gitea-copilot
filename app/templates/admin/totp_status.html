{% extends "base.html" %}
{% block title %}管理两步验证{% endblock %}

{% block content %}
<div class="card-hero">
    <div class="card-header">
        <h2>两步验证</h2>
        <p>{{ admin_username }}</p>
    </div>
    <div style="padding: 1.5rem;">
        {% if totp_enabled %}
        <div class="alert alert-success">
            <strong>已启用</strong> - 每次登录需验证码
        </div>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form action="/admin/totp/disable" method="post">
            <div class="form-group">
                <label>输入验证码关闭</label>
                <input type="text" name="otp_code" required placeholder="6位验证码" maxlength="6">
            </div>
            <button type="submit" class="btn btn-danger btn-block">关闭两步验证</button>
        </form>
        {% else %}
        <div class="alert alert-warning">
            <strong>未启用</strong> - 建议开启提高安全性
        </div>
        <a href="/admin/totp" class="btn btn-primary btn-block">启用两步验证</a>
        {% endif %}
        <div class="mt-2">
            <a href="/admin/dashboard" class="btn btn-outline btn-block">返回</a>
        </div>
    </div>
</div>
{% endblock %}
